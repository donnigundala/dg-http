http:
  enabled: true
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
  middleware:
    cors:
      enabled: true
      allow_origins: ["*"]
    
    gzip:
      enabled: true
      level: 5
    
    request_id:
      enabled: true
    
    logger:
      enabled: true
    
    recovery:
      enabled: true
